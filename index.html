<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2b160d" />
  <title>¿Quieres ser mi novia? 🌼</title>

  <!-- Tipografías: título mágico, firma manuscrita y cuerpo legible -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Dancing+Script:wght@600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="pagina-inicio">

  <!-- Banner decorativo de papel picado, se llena por JS -->
  <div class="papel-picado" id="papelPicado" aria-hidden="true">
    <div class="papel-picado__hilo"></div>
  </div>

  <!-- Pétalos de cempasúchil cayendo (decorativo) -->
  <div class="petalos" id="petalos" aria-hidden="true"></div>

  <main class="pantalla-pregunta">
    <div class="resplandor" aria-hidden="true"></div>

    <div class="contenedor">
      <p class="pregunta__eyebrow">Para Maivy,</p>
      <h1 class="pregunta__titulo">¿Quieres ser<br />mi novia?</h1>
      <p class="pregunta__texto">
        Llevo tiempo queriendo preguntarte esto. Solo tienes que decir que sí.
      </p>

      <div class="botonera" id="botonera">
        <button type="button" class="boton boton--si" id="btnSi">Sí, quiero 💛</button>
        <audio id="cancion" src="assets/cancion.mp3" preload="auto"></audio>
        <button type="button" class="boton boton--no" id="btnNo">No</button>
      </div>

      <p class="pregunta__pie">🌼 Toca con cariño 🌼</p>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
